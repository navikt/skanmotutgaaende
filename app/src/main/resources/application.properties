spring.main.banner-mode=off

server.shutdown=graceful
camel.springboot.use-mdc-logging=true
camel.springboot.jmx-enabled=false

skanmotutgaaende.filomraade.inngaaendemappe=inbound/SKANMOTUTGAAENDE
skanmotutgaaende.filomraade.feilmappe=inbound/SKANMOTUTGAAENDE_FEIL
skanmotutgaaende.filomraade.fagpostmappe=inbound/SKANMOTUTGAAENDE_TIL_FAGPOST
skanmotutgaaende.completiontimeout=30s

# Actuator
management.endpoints.web.exposure.include=prometheus,health

# Spring Cloud Vault
spring.config.import=vault://
spring.cloud.vault.uri=https://vault.adeo.no
spring.cloud.vault.authentication=KUBERNETES
spring.cloud.vault.kubernetes.role=skanmotutgaaende
spring.cloud.vault.kubernetes.kubernetes-path=${skanmotutgaaende.vault.kubernetespath}

spring.cloud.vault.kv.backend=${skanmotutgaaende.vault.backend}
spring.cloud.vault.kv.application-name=skanmotutgaaende/secrets
spring.cloud.vault.kv.default-context=skanmotutgaaende/secrets