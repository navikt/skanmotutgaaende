spring.main.banner-mode=off

server.shutdown=graceful
camel.main.use-mdc-logging=true
camel.main.jmx-enabled=false

skanmotutgaaende.filomraade.inngaaendemappe=inbound/SKANMOTUTGAAENDE
skanmotutgaaende.filomraade.feilmappe=inbound/SKANMOTUTGAAENDE_FEIL
skanmotutgaaende.filomraade.fagpostmappe=inbound/SKANMOTUTGAAENDE_TIL_FAGPOST
skanmotutgaaende.filomraade.avstemmappe=inbound/SKANMOTUTGAAENDE_AVSTEMMING
skanmotutgaaende.completiontimeout=30s

# Actuator
management.endpoints.web.exposure.include=prometheus,health

# reactive
spring.http.codecs.max-in-memory-size=200MB

# Slack
skanmotutgaaende.slack.token=${SLACK_TOKEN}
skanmotutgaaende.slack.channel=${SLACK_CHANNEL}
skanmotutgaaende.slack.enabled=${SLACK_ALERTS_ENABLED}

# Jira
skanmotutgaaende.jira.username=${JIRA_USERNAME}
skanmotutgaaende.jira.password=${JIRA_PASSWORD}