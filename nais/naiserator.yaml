kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: skanmotutgaaende
  namespace: teamdokumenthandtering
  labels:
    team: teamdokumenthandtering
spec:
  env:
    - name: SKANMOTUTGAAENDE_SCHEDULE
      value: {{ SKANMOTUTGAAENDE_SCHEDULE }}
    - name: SKANMOTUTGAAENDE_SFTP_PRIVATEKEY
      value: /var/run/secrets/nais.io/keys/privatekey
    - name: SKANMOTUTGAAENDE_SFTP_HOSTKEY
      value: /var/run/secrets/nais.io/keys/hostkey
    - name: SKANMOTUTGAAENDE_PGP_PRIVATEKEY
      value: /var/run/secrets/nais.io/keys/pgpprivatekey
    - name: SKANMOTUTGAAENDE_VAULT_BACKEND
      value: {{ SKANMOTUTGAAENDE_VAULT_BACKEND }}
    - name: SKANMOTUTGAAENDE_VAULT_KUBERNETESPATH
      value: {{ SKANMOTUTGAAENDE_VAULT_KUBERNETESPATH }}
    - name: SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_URL
      value: {{ SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_URL }}
    - name: SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_SCOPE
      value: {{ SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_SCOPE }}
    - name: SKANMOTUTGAAENDE_PROXY_HOST
      value: {{ SKANMOTUTGAAENDE_PROXY_HOST }}
    - name: SKANMOTUTGAAENDE_PROXY_PORT
      value: "{{SKANMOTUTGAAENDE_PROXY_PORT}}"
    - name: AZURE_APP_TOKEN_URL
      value: {{ AZURE_APP_TOKEN_URL }}
  image: {{ image }}
  ingresses:
    {{#each INGRESSES}}
       - {{this }}
      {{/each}}
  liveness:
    path: /actuator/health/liveness
    port: 8080
    initialDelay: 30
    failureThreshold: 10
  port: 8080
  prometheus:
    enabled: true
    path: /actuator/prometheus
  readiness:
    path: /actuator/health/readiness
    port: 8080
    initialDelay: 30
    timeout: 3
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      cpu: 2000m
      memory: 2048Mi
    requests:
      memory: 1024Mi
  vault:
    enabled: true
    paths:
      - kvPath: {{ SRVSKANMOTUTGAAENDE }}
        mountPath: /var/run/secrets/nais.io/srvskanmotutgaaende
      - kvPath: {{ SFTP_KEYS }}
        mountPath: /var/run/secrets/nais.io/keys
  azure:
    application:
      enabled: true
