kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: skanmotutgaaende
  namespace: teamdokumenthandtering
  labels:
    team: teamdokumenthandtering
spec:
  env:
    - name: SKANMOTUTGAAENDE_SFTP_PRIVATEKEY
      value: /var/run/secrets/nais.io/skanmotutgaaende/sftp/sftpprivatekey
    - name: SKANMOTUTGAAENDE_SFTP_HOSTKEY
      value: /var/run/secrets/nais.io/skanmotutgaaende/keys/hostkey
    - name: SKANMOTUTGAAENDE_PGP_PRIVATEKEY
      value: /var/run/secrets/nais.io/skanmotutgaaende/keys/pgpprivatekey
    - name: SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_URL
      value: {{ SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_URL }}
    - name: SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_SCOPE
      value: {{ SKANMOTUTGAAENDE_ENDPOINTS_DOKARKIV_SCOPE }}
    - name: SKANMOTUTGAAENDE_JIRA_URL
      value: {{ SKANMOTUTGAAENDE_JIRA_URL }}
  image: {{ image }}
  ingresses:
    {{#each INGRESSES}}
       - {{this }}
      {{/each}}
  liveness:
    path: /actuator/health/liveness
    port: 8080
    initialDelay: 30
    failureThreshold: 10
  port: 8080
  prometheus:
    enabled: true
    path: /actuator/prometheus
  readiness:
    path: /actuator/health/readiness
    port: 8080
    initialDelay: 30
    timeout: 3
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      memory: 2048Mi
    requests:
      cpu: 20m
      memory: 1024Mi
  webproxy: true
  azure:
    application:
      enabled: true
  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
  filesFrom:
    - mountPath: /var/run/secrets/nais.io/skanmotutgaaende/pgp
      secret: skanmot-pgp-keys
    - mountPath: /var/run/secrets/nais.io/skanmotutgaaende/sftp
      secret: skanmot-sftp-keys
  envFrom:
    - secret: {{ SKANMOTUTGAAENDE_SECRET }}
    - secret: slack-alerts
    - secret: jira-service-user
