skanmotutgaaende.serviceuser.username=srvusername
skanmotutgaaende.serviceuser.password=srvpassword
skanmotutgaaende.endpoints.dokarkiv.scope=api://dev-fss.teamdokumenthandtering.dokarkiv/.default
skanmotutgaaende.endpoints.dokarkiv.url=http://localhost:${wiremock.server.port}/rest
skanmotutgaaende.filomraade.inngaaendemappe=inngaaende
skanmotutgaaende.filomraade.feilmappe=feilmappe
skanmotutgaaende.filomraade.avstemmappe=avstemmappe
skanmotutgaaende.completiontimeout=10s
skanmotutgaaende.utgaaende.schedule=*+*+*+*+*+*
skanmotutgaaende.avstem.schedule=*/2+*+*+*+*+*
skanmotutgaaende.avstem.startup=true
skanmotutgaaende.endpointuri=sftp://{{skanmotutgaaende.sftp.host}}:{{skanmotutgaaende.sftp.port}}
skanmotutgaaende.endpointconfig=username={{skanmotutgaaende.sftp.username}}\
  &password=&preferredAuthentications=publickey\
  &privateKeyFile={{skanmotutgaaende.sftp.privatekey}}\
  &strictHostKeyChecking=yes&knownHostsFile={{skanmotutgaaende.sftp.hostkey}}\
  &binary=true

# sftp
skanmotutgaaende.sftp.port=1234
skanmotutgaaende.sftp.host=localhost
skanmotutgaaende.sftp.username=itestUser
skanmotutgaaende.sftp.privatekey=src/test/resources/sftp/klient_id_rsa
skanmotutgaaende.sftp.hostkey=src/test/resources/sftp/known_hosts

# spring cloud vault
skanmotutgaaende.vault.backend=kv/preprod/fss
skanmotutgaaende.vault.kubernetespath=kubernetes/preprod/fss
spring.cloud.vault.enabled=false


#Azure
azure.openid-config-token-endpoint=http://localhost:${wiremock.server.port}/azure_token
azure.app-client-id=test-client
azure.app-client-secret=test-secret

# reactive
spring.codec.max-in-memory-size=20MB

wiremock.reset-mappings-after-each-test=true

# jira
skanmotutgaaende.jira.password=.jira.username=srvjira
skanmotutgaaende.jira.username=.jira.password=jirapassord
skanmotutgaaende.jira.url=http://localhost:${wiremock.server.port}