skanmotutgaaende.endpointuri=sftp://{{skanmotutgaaende.sftp.host}}:{{skanmotutgaaende.sftp.port}}
skanmotutgaaende.endpointconfig=username={{skanmotutgaaende.sftp.username}}\
  &password=&preferredAuthentications=publickey\
  &privateKeyFile={{skanmotutgaaende.sftp.privatekey}}\
  &strictHostKeyChecking=yes&knownHostsFile={{skanmotutgaaende.sftp.hostkey}}\
  &binary=true

# sftp
skanmotutgaaende.sftp.host=localhost
skanmotutgaaende.sftp.username=itestUser
