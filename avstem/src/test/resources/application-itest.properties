spring.main.banner-mode=off
skanmotutgaaende.endpoints.dokarkiv.scope=api://dev-fss.teamdokumenthandtering.dokarkiv/.default
skanmotutgaaende.endpoints.dokarkiv.url=http://localhost:${wiremock.server.port}/rest
